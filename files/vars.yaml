# 时间服务器
NTP: 10.37.1.141

# 用于高可用的主机列表ip
all_masters:
  - 10.37.1.141
  - 10.37.1.142
  - 10.37.1.143

# certSANs高可用dns白名单配置
certSANs:
  - 10.37.1.141
  - 10.37.1.142
  - 10.37.1.143
  - 127.0.0.1
  - master1
  - master2
  - master3
  - ha-apiserveraddr

# 控制面板主机名，不需要修改，固定为[manage_node]
# 如果需要高可用，请将这里改成，kubeadm时会用到control_plane_endpoint: ha-apiserveraddr:16443
#control_plane_endpoint: master1
control_plane_endpoint: ha-apiserveraddr:16443

# kubeadm init使用，大版本号，不需要后缀
kubernetes_version: v1.36.0

# 详细版本请看README.md
# apt版本修改这个
kube_3tools_version: 1.36.0-1.1
# yum版本修改这个
kube_3tools_version_yum: 1.28.4-150500.1.1

# 定义pod的cidr网络，kubeadm init使用
pod_network_cidr: 10.244.0.0/16 
# kubeadm init使用
apiserver_advertise_address: 10.37.1.141

# 修改calico使用custom-resources.yaml使用
pod_network: 10.244.0.0/16

# pause所使用镜像版本，需要替换阿里源，官方源国内无法拉取
sandbox_image: pause:3.10.1

# 有版本依赖，请参考README.md指引更换版本
calico_version: v3.32.1
# 如果在微软云部署，需要修改CrossSubnet为Always
# kubectl get ippools -o yaml 将CrossSubnet改为Always
# kubectl -n calico-system rollout restart ds calico-node。

# 有版本依赖，请参考README.md指引更换版本
ingress_version: v1.15.1

# 有版本依赖，请参考README.md指引更换版本
metrics_server_version: v0.8.1

# 有版本依赖，请参考README.md指引更换版本
kube_prometheus_version: 0.18.0
grafana_host: grafana.example.local

# harbor域名,私有仓库域名
harbor_domain: harbor.example.local
harbor_ip: 10.37.1.143
harbor_port: 16443
# 使用哪种方式访问harbor(此处默认使用secert，，需要在每个资源文件中添加参数imagePullSecrets,
# 详情参考仓库根目录readme,如果使用password参考files/harbor/with_password_config.toml.j2文件中格式
# 升级到containerd 2.x后，harbor的密码认证方式不再支持password方式，必须使用secret方式)
passord_or_secert: secert


